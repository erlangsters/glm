name: Verify

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "verify-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  ubuntu:
    name: Ubuntu drift check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the source code
        uses: actions/checkout@v4

      - name: Set up Erlang/OTP
        uses: erlangsters/setup-erlang@v1
        with:
          erlang-version: 28
          install-rebar3: true

      - name: Compile the binding
        run: rebar3 compile

      - name: Run the regression tests
        run: rebar3 eunit

  macos:
    name: macOS drift check
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Check out the source code
        uses: actions/checkout@v4

      - name: Set up Erlang/OTP
        uses: erlangsters/setup-erlang@v1
        with:
          erlang-version: 28
          install-rebar3: true

      - name: Compile the binding
        run: rebar3 compile

      - name: Run the regression tests
        run: rebar3 eunit

  windows:
    name: Windows drift check
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out the source code
        uses: actions/checkout@v4

      - name: Set up Erlang/OTP
        uses: erlangsters/setup-erlang@v1
        with:
          erlang-version: 28
          install-rebar3: true

      - name: Compile the binding
        run: rebar3 compile
        shell: pwsh

      - name: Run the regression tests
        run: rebar3 eunit
        shell: pwsh

  documentation:
    name: Documentation build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the source code
        uses: actions/checkout@v4

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Set up Erlang/OTP
        uses: erlangsters/setup-erlang@v1
        with:
          erlang-version: 28
          install-rebar3: true

      - name: Build the documentation
        run: rebar3 as docs ex_doc