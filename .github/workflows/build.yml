name: Build

on:
  push:
    branches: ["master"]
    paths:
      - ".github/workflows/build.yml"
      - "CMakeLists.txt"
      - "rebar.config"
      - "c_src/**"
      - "include/**"
      - "src/**"
      - "test/**"
  pull_request:
    branches: ["master"]
    paths:
      - ".github/workflows/build.yml"
      - "CMakeLists.txt"
      - "rebar.config"
      - "c_src/**"
      - "include/**"
      - "src/**"
      - "test/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "build-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  ubuntu:
    name: Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the source code
        uses: actions/checkout@v4

      - name: Set up Erlang/OTP
        uses: erlangsters/setup-erlang@v1
        with:
          erlang-version: 28
          install-rebar3: true

      - name: Compile the binding
        run: rebar3 compile

      - name: Run the regression tests
        run: rebar3 eunit

  macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Check out the source code
        uses: actions/checkout@v4

      - name: Set up Erlang/OTP
        uses: erlangsters/setup-erlang@v1
        with:
          erlang-version: 28
          install-rebar3: true

      - name: Compile the binding
        run: rebar3 compile

      - name: Run the regression tests
        run: rebar3 eunit

  windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out the source code
        uses: actions/checkout@v4

      - name: Set up Erlang/OTP
        uses: erlangsters/setup-erlang@v1
        with:
          erlang-version: 28
          install-rebar3: true

      - name: Compile the binding
        run: rebar3 compile
        shell: pwsh

      - name: Run the regression tests
        run: rebar3 eunit
        shell: pwsh